# AI Issue Handler Configuration
# Rule evaluation order: first match wins (top-to-bottom)

settings:
  rate_limit_threshold: 2          # max issues per 24h per user
  min_text_length: 50              # min chars for AI classification
  bot_username: "oct-support"      # bot account username for self-filtering
  monthly_budget_usd: 0.90         # hard cap for OpenAI fallback costs ($0.90 ≈ €1)

rules:
  - name: proxmox-unsupported
    keywords: ["proxmox", "proxmox ve"]
    match_mode: any
    answer_file: unsupported_setups.md
    labels: ["support"]
    close: true

  - name: docker-install
    keywords: ["docker", "install", "container"]
    match_mode: all
    answer_file: installation.md
    labels: ["support"]
    close: false
